<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="widtd=device-widtd, initial-scale=1.0">
    <meta name="autdor" content="Ivan Caldarella">
    <meta name="description" content="Pratica con gli elementi di Bootstrap - Aggiungi Libro">

    <!-- Link Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <!-- Padrone del mondo -->
    <link rel="stylesheet" href="./style/index.css">

    <title>Bootstrap Dashboard</title>
</head>

<body>
    <header class="header">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom border-body">
            <div class="container-fluid">
                <img src="img/duckglasses.png" alt="logo" height="64" width="64">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>
    <main class="container mt-4">
        <div class="row">
            <div class="col-6">
                <a class="btn btn-primary mb-1" href="./index.html">
                    <i class="bi bi-backspace"></i>
                </a>
                <h1 class="h2">Nuovo Libro</h1>
            </div>
        </div>
        <form>
            <div class="row">
                <div class="mb-3 col-6">
                    <label for="autornome" class="form-label">Nome Autore</label>
                    <input type="text" class="form-control" id="autornome" placeholder="Inserisci il nome dell'autore">
                </div>
                <div class="mb-3 col-6">
                    <label for="autorcognome" class="form-label">Cognome Autore</label>
                    <input type="text" class="form-control" id="autorcognome"
                        placeholder="Inserisci il cognome dell'autore">
                </div>
                <div class="mb-3 col-12">
                    <label for="titololibro" class="form-label">Titolo</label>
                    <input type="text" class="form-control" id="titololibro" aria-describedby="titololibroHelp"
                        placeholder="Inserisci il titolo del libro">
                    <div id="titololibroHelp" class="form-text">Titolo versione italiana</div>
                </div>
            </div>
            <div class="row">
                <div class="mb-3 col-12 col-lg-4">
                    <label for="genderlist" class="form-label">Genere</label>
                    <select class="form-select" aria-label="Default select example" id="genderlist">
                        <option selected>Scegli il genere</option>
                        <option value="1">Donna</option>
                        <option value="2">Uomo</option>
                        <option value="3">Preferisco non rispondere</option>
                        <option value="4">Perchè non me lo dici tu?</option>
                        <option value="5">E poi magari fatti i fatti tuoi</option>
                        <option value="6">...</option>
                        <option value="7">Granchio</option>
                    </select>
                </div>
                <div class="mb-3 col-12 col-lg-4">
                    <label for="pubanno" class="form-label">Anno di Pubblicazione</label>
                    <input type="text" class="form-control" id="pubanno" placeholder="Inserisci l'anno">
                </div>
                <div class="mb-3 col-12 col-lg-4">
                    <label for="isbncode" class="form-label">ISBN#</label>
                    <input type="text" class="form-control" id="isbncode" placeholder="Inserisci il codice ISBN#">
                </div>
            </div>
            <div class="row">
                <div class="col-12 mb-3">
                    <hr class="col-12">
                </div>
                <div class="col mb-2">
                    <label for="notesofbook" class="form-label">Note</label>
                    <textarea class="form-control" placeholder="Inserisci eventuali note del libro" id="notesofbook"
                        style="height: 100px"></textarea>
                    <div class="mt-3 mb-4 form-check col-12">
                        <input type="checkbox" class="form-check-input" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Disponibile anche in digitale</label>
                    </div>
                    <div class="mb-3 ml-3 col-12">
                        <button type="submit" class="btn btn-primary w-25">Aggiungi Libro</button>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
